apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-chat
  labels:
    app: simple-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-chat
  template:
    metadata:
      labels:
        app: simple-chat
    spec:
      containers:
        - name: simple-chat
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          env:
            - name: VLLM_GPU_ENDPOINT
              value: {{ .Values.env.VLLM_GPU_ENDPOINT | quote }}
            - name: VLLM_CPU_ENDPOINT
              value: {{ .Values.env.VLLM_CPU_ENDPOINT | quote }}
