---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemo-guardrails-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemo-guardrails-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["trustyai-service-operator-config"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemo-guardrails-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: nemo-guardrails-patcher
    namespace: redhat-ods-applications
roleRef:
  kind: Role
  name: nemo-guardrails-patcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-nemo-guardrails-config
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: patch-nemo-guardrails-config
    spec:
      serviceAccountName: nemo-guardrails-patcher
      restartPolicy: Never
      containers:
        - name: kubectl
          image: registry.redhat.io/openshift4/ose-cli-rhel9:latest
          command:
            - /bin/sh
            - -c
            - |
              oc annotate configmap/trustyai-service-operator-config \
                -n redhat-ods-applications \
                opendatahub.io/managed='false' --overwrite &&
              oc patch configmap/trustyai-service-operator-config \
                -n redhat-ods-applications \
                --type merge \
                -p '{"data":{"nemo-guardrails-image":"quay.io/rhoai-genaiops/nemo-guardrails:hf_classifier_v13"}}'
