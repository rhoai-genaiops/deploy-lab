---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow-operator-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlflow-operator-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["mlflow-operator-controller-manager"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlflow-operator-patcher
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: mlflow-operator-patcher
    namespace: redhat-ods-applications
roleRef:
  kind: Role
  name: mlflow-operator-patcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-mlflow-operator
  namespace: redhat-ods-applications
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: patch-mlflow-operator
    spec:
      serviceAccountName: mlflow-operator-patcher
      restartPolicy: Never
      containers:
        - name: kubectl
          image: registry.redhat.io/openshift4/ose-cli-rhel9:latest
          command:
            - /bin/sh
            - -c
            - |
              oc annotate deployment/mlflow-operator-controller-manager \
                -n redhat-ods-applications \
                opendatahub.io/managed='false' --overwrite &&
              oc set env deployment/mlflow-operator-controller-manager \
                -n redhat-ods-applications \
                MLFLOW_IMAGE=quay.io/rhoai-genaiops/mlflow:3.10-rhaiv3-v2
